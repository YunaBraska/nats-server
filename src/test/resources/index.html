<head>
    <style>
        .ui-root {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            background: radial-gradient(circle at top, #10131f, #050509);
            color: #f5f5f5;
        }

        .top-bar {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(to right, #111827, #020617);
            font-size: 0.9rem;
        }

        .resource {
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            backdrop-filter: blur(4px);
        }

        .layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            flex: 1;
        }

        .sidebar {
            padding: 1rem;
            border-right: 1px solid rgba(30, 64, 175, 0.6);
            background: rgba(15, 23, 42, 0.9);
        }

        .nav-btn {
            display: block;
            width: 100%;
            margin-bottom: 0.5rem;
            padding: 0.6rem 0.8rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(96, 165, 250, 0.4);
            background: rgba(15, 23, 42, 0.8);
            cursor: pointer;
        }

        .outpost-grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(6, 40px);
            gap: 4px;
            padding: 1rem;
        }

        .tile {
            width: 40px;
            height: 40px;
            border-radius: 0.4rem;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 1px rgba(30, 64, 175, 0.4);
        }

        .tile.building {
            position: relative;
            animation: pulse 3s infinite;
        }

        .human-habitat {
            background: radial-gradient(circle, #22c55e 0%, #0f172a 70%);
        }

        .human-lab {
            background: radial-gradient(circle, #38bdf8 0%, #020617 70%);
        }

        .tile.empty {
            opacity: 0.25;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3); }
            50%      { box-shadow: 0 0 12px 2px rgba(96, 165, 250, 0.8); }
        }
    </style>
</head>
<div class="ui-root">
    <header class="top-bar">
        <div class="resource">⚡ 1200</div>
        <div class="resource">🌱 800</div>
        <div class="resource">⛏️ 450</div>
        <div class="resource">📡 90</div>
    </header>

    <main class="layout">
        <nav class="sidebar">
            <button class="nav-btn">Außenposten</button>
            <button class="nav-btn">Karte</button>
            <button class="nav-btn">Armeen</button>
            <button class="nav-btn">Forschung</button>
            <button class="nav-btn">Log</button>
        </nav>

        <section class="content">
            <div class="outpost-grid">
                <div class="tile building human-habitat lvl1"></div>
                <div class="tile building human-lab lvl2"></div>
                <div class="tile empty"></div>
                <!-- ... -->
            </div>
        </section>
    </main>
</div>
